name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  Lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint MDX files
        run: |
          echo "Checking for placeholder Akash addresses..."
          if grep -rn 'akash1\.\.\.' --include="*.mdx" --include="*.md" .; then
            echo "Error: placeholder Akash addresses found (akash1...xxx)"
            exit 1
          fi

          echo "Lint passed."
