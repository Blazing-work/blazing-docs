name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv venv --python 3.12

      - name: Install dependencies
        run: uv pip install ruff

      - name: Run Ruff linter
        run: uv run ruff check --output-format=github .

      - name: Run Ruff formatter check
        run: uv run ruff format --check .

  validate:
    name: Validate Examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv venv --python 3.12

      - name: Install dependencies
        run: uv pip install blazing

      - name: Validate Python syntax
        run: |
          find . -name "*.py" -type f | while read file; do
            python3 -m py_compile "$file" || exit 1
          done

      - name: Validate examples.json
        run: python3 -c "import json; json.load(open('examples.json'))"

  test-matrix:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        run: uv venv --python ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv pip install blazing pytest

      - name: Validate syntax on Python ${{ matrix.python-version }}
        run: |
          find . -name "*.py" -type f | while read file; do
            uv run python -m py_compile "$file" || exit 1
          done
